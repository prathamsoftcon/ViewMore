<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="./viewmore.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div><img id="primaryLogo" class="bhoj_logo" title="" src=""></div>
            <div><img id="secondaryLogo" class="lit-logo" title="" src=""></div>
        </div>
        <h1 id="universityName"></h1>
    </header>

    <main>
        <section aria-labelledby="product-list-heading">
            <h4 id="product-list-heading"></h4>
            <div class="card">
                <label id="trainingCodeLabel" class="label" for="trainingCode"></label>
                <input class="input" type="text" id="trainingCode" inputmode="numeric" maxlength="20" placeholder="Enter Training Code">
                <br><br>

                <label id="enrollmentLabel" class="label" for="enrollmentNo"></label>
                <input class="input" type="text" id="enrollmentNo" inputmode="numeric" maxlength="20" placeholder="Enter Enrollment No">
                <br>

                <button id="verifyButton" type="button" onclick="Verify_Certificate()" class="button"></button>
            </div>
        </section>
    </main>

    <footer>
        <p id="footerText"></p>
    </footer>

    <script>
        const CONFIG_JSON = './html_config.json';
        let appConfig = null;

        function getTrainingIdFromTrainingDetails(trainingDetailsResponse) {
            const keys = ['trainingid', 'training_id', 't_id', 'tId', 'trainingId'];

            function pickId(obj) {
                if (!obj || typeof obj !== 'object' || Array.isArray(obj)) {
                    return '';
                }

                for (const key of keys) {
                    if (obj[key] !== undefined && obj[key] !== null && String(obj[key]).trim() !== '') {
                        return String(obj[key]).trim();
                    }
                }

                if (obj.id !== undefined && obj.id !== null && String(obj.id).trim() !== '' && (obj.trainingcode || obj.training_code || obj.t_Code)) {
                    return String(obj.id).trim();
                }

                return '';
            }

            function scan(node) {
                if (!node) {
                    return '';
                }

                if (Array.isArray(node)) {
                    for (const item of node) {
                        const idFromItem = scan(item);
                        if (idFromItem) {
                            return idFromItem;
                        }
                    }
                    return '';
                }

                if (typeof node === 'object') {
                    const directId = pickId(node);
                    if (directId) {
                        return directId;
                    }

                    const prioritizedChildren = ['data', 'result', 'training', 'value'];
                    for (const childKey of prioritizedChildren) {
                        if (node[childKey] !== undefined) {
                            const idFromChild = scan(node[childKey]);
                            if (idFromChild) {
                                return idFromChild;
                            }
                        }
                    }
                }

                return '';
            }

            return scan(trainingDetailsResponse);
        }

        function applyConfigToUi() {
            document.title = appConfig.pageTitle;

            const primaryLogo = document.getElementById('primaryLogo');
            const secondaryLogo = document.getElementById('secondaryLogo');
            const universityName = document.getElementById('universityName');
            const courseHeading = document.getElementById('product-list-heading');
            const trainingCodeLabel = document.getElementById('trainingCodeLabel');
            const enrollmentLabel = document.getElementById('enrollmentLabel');
            const verifyButton = document.getElementById('verifyButton');
            const footerText = document.getElementById('footerText');

            if (primaryLogo && appConfig.header && appConfig.header.primaryLogoSrc) {
                primaryLogo.src = appConfig.header.primaryLogoSrc;
            }
            if (secondaryLogo && appConfig.header && appConfig.header.secondaryLogoSrc) {
                secondaryLogo.src = appConfig.header.secondaryLogoSrc;
            }
            if (appConfig.header && appConfig.header.logoTitle) {
                if (primaryLogo) {
                    primaryLogo.title = appConfig.header.logoTitle;
                    primaryLogo.alt = appConfig.header.logoTitle;
                }
                if (secondaryLogo) {
                    secondaryLogo.title = appConfig.header.logoTitle;
                    secondaryLogo.alt = appConfig.header.logoTitle;
                }
            }
            if (universityName && appConfig.header && appConfig.header.universityName) {
                universityName.textContent = appConfig.header.universityName;
            }
            if (courseHeading && appConfig.header && appConfig.header.courseHeading) {
                courseHeading.textContent = appConfig.header.courseHeading;
            }
            if (trainingCodeLabel) {
                trainingCodeLabel.textContent = (appConfig.labels && (appConfig.labels.trainingCode || appConfig.labels.training)) || 'Enter Training Code';
            }
            if (enrollmentLabel) {
                enrollmentLabel.textContent = (appConfig.labels && (appConfig.labels.enrollmentNo || appConfig.labels.mobile)) || 'Enter Enrollment No';
            }
            if (verifyButton) {
                verifyButton.textContent = (appConfig.labels && appConfig.labels.verifyButton) || 'Verify';
            }
            if (footerText && appConfig.labels && appConfig.labels.footer) {
                footerText.textContent = appConfig.labels.footer;
            }
        }

        async function loadConfig() {
            try {
                const response = await fetch(CONFIG_JSON, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('Config JSON not found');
                }
                const jsonConfig = await response.json();

                const hasRequiredFields =
                    jsonConfig &&
                    jsonConfig.pageTitle &&
                    jsonConfig.header &&
                    jsonConfig.labels &&
                    jsonConfig.api &&
                    jsonConfig.messages &&
                    jsonConfig.api.apiKey &&
                    jsonConfig.api.apiPath &&
                    jsonConfig.api.verifyCertificateEndpoint;

                if (!hasRequiredFields) {
                    throw new Error('Config JSON is missing required fields');
                }

                appConfig = jsonConfig;
                applyConfigToUi();
            } catch (error) {
                alert('Configuration load failed. Please check html_config.json');
            }
        }

        function Verify_Certificate() {
            if (!appConfig) {
                alert('Configuration is not loaded.');
                return;
            }

            const trainingCode = document.getElementById('trainingCode').value.trim();
            const usercode = document.getElementById('enrollmentNo').value.trim();
            const apiKey = appConfig.api.apiKey;
            const APIPath = appConfig.api.apiPath;
            const trainingDetailsEndpoint = appConfig.api.trainingDetailsByCodeEndpoint || '/Training_Details_by_Code';

            if (!trainingCode) {
                alert((appConfig.messages && appConfig.messages.invalidTrainingCode) || 'Please enter training code.');
                return;
            }

            if (!usercode) {
                alert((appConfig.messages && appConfig.messages.invalidEnrollmentNo) || 'Please enter enrollment number.');
                return;
            }

            const trainingDetailsUrl = APIPath + trainingDetailsEndpoint + '?trainingcode=' + encodeURIComponent(trainingCode);

            axios.get(trainingDetailsUrl, {
                headers: {
                    'APIKey': apiKey,
                    'Content-Type': 'application/json'
                }
            })
            .then(trainingResponse => {
                if (trainingResponse.status !== 200) {
                    throw new Error((appConfig.messages && appConfig.messages.invalidTrainingCode) || 'Invalid training code.');
                }

                const trainingid = getTrainingIdFromTrainingDetails(trainingResponse.data);
                if (!trainingid) {
                    throw new Error((appConfig.messages && appConfig.messages.invalidTrainingCode) || 'Invalid training code.');
                }

                const verifyApiUrl = APIPath + appConfig.api.verifyCertificateEndpoint + '?usercode=' + encodeURIComponent(usercode) + '&trainingid=' + encodeURIComponent(trainingid);

                return axios.get(verifyApiUrl, {
                    headers: {
                        'APIKey': apiKey,
                        'Content-Type': 'application/json'
                    }
                });
            })
            .then(response => {
                if (response.status === 200) {
                    if (response.data !== '') {
                        alert(appConfig.messages.validCertificatePrefix + response.data);
                    } else {
                        alert(appConfig.messages.invalidCertificate);
                    }
                } else {
                    alert(appConfig.messages.verifyFailed);
                }
            })
            .catch(error => {
                if (error && error.message && !error.response && !error.request) {
                    alert(error.message);
                    return;
                }

                if (error.response) {
                    alert(appConfig.messages.apiErrorPrefix + error.response.status + ' - ' + ((error.response.data && error.response.data.message) || 'Unknown error'));
                } else if (error.request) {
                    alert(appConfig.messages.noResponse);
                } else {
                    alert(appConfig.messages.unexpectedError);
                }
            });
        }

        loadConfig();
    </script>
</body>
</html>
