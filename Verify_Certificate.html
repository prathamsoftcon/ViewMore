<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="./viewmore.css">
</head>
<body>
    <header>
        <div class="header-container">
           <div><img id="primaryLogo" class="bhoj_logo" title="Nack" src=""></div>
            <div><img id="secondaryLogo" class="lit-logo" title="College" src=""></div>
        </div>
        <h1 id="universityName"></h1>
    </header>

    <main>
        <section aria-labelledby="product-list-heading">
            <h4 id="product-list-heading"></h4>
            <div class="card">
                <label id="mobileLabel" class="label" for="mobileNo"></label>
                <input class="input" type="tel" id="mobileNo" maxlength="10" inputmode="numeric">
                <br>
                <button id="verifyMobileButton" type="button" onclick="Verify_Mobile()" class="button"></button>
                <br><br>
                <label id="trainingLabel" class="label" for="ddltraining"></label>
                <select id="ddltraining" class="input" disabled>
                    <option value="">Select Training</option>
                </select>
                <br>
                <button id="verifyButton" type="button" onclick="Verify_Certificate()" class="button"></button>
            </div>
        </section>
    </main>

    <footer>
        <p id="footerText"></p>
    </footer>

    <script>
        const CONFIG_JSON = './html_config.json';
        let appConfig = null;
        let agencyid = '';
        let verifiedMobileNo = '';
        let verifiedUserCode = '';

        function getAgencyIdFromUserInfo(userInfoResponse) {
            if (!userInfoResponse || !userInfoResponse.result) {
                return '';
            }

            const result = userInfoResponse.result;
            return (
                (result.agencydetail && result.agencydetail.agencyid) ||
                (result.userdetails && result.userdetails.agencyid) ||
                ''
            );
        }

        function getUserCodeFromUserInfo(userInfoResponse) {
            if (!userInfoResponse || !userInfoResponse.result) {
                return '';
            }

            const result = userInfoResponse.result;
            return (
                (result.agencydetail && result.agencydetail.userCode) ||
                ''
            );
        }

        function getTrainingsArray(trainingResponse) {
            if (Array.isArray(trainingResponse)) {
                return trainingResponse;
            }
            if (trainingResponse && Array.isArray(trainingResponse.result)) {
                return trainingResponse.result;
            }
            if (trainingResponse && Array.isArray(trainingResponse.data)) {
                return trainingResponse.data;
            }
            return [];
        }

        function applyConfigToUi() {
            document.title = appConfig.pageTitle;

            const primaryLogo = document.getElementById('primaryLogo');
            const secondaryLogo = document.getElementById('secondaryLogo');
            const universityName = document.getElementById('universityName');
            const courseHeading = document.getElementById('product-list-heading');
            const mobileLabel = document.getElementById('mobileLabel');
            const verifyMobileButton = document.getElementById('verifyMobileButton');
            const trainingLabel = document.getElementById('trainingLabel');
            const verifyButton = document.getElementById('verifyButton');
            const footerText = document.getElementById('footerText');

            if (primaryLogo && appConfig.header && appConfig.header.primaryLogoSrc) {
                primaryLogo.src = appConfig.header.primaryLogoSrc;
            }
            if (secondaryLogo && appConfig.header && appConfig.header.secondaryLogoSrc) {
                secondaryLogo.src = appConfig.header.secondaryLogoSrc;
            }
            if (appConfig.header && appConfig.header.logoTitle) {
                if (primaryLogo) {
                    primaryLogo.title = appConfig.header.logoTitle;
                    primaryLogo.alt = appConfig.header.logoTitle;
                }
                if (secondaryLogo) {
                    secondaryLogo.title = appConfig.header.logoTitle;
                    secondaryLogo.alt = appConfig.header.logoTitle;
                }
            }
            if (universityName && appConfig.header && appConfig.header.universityName) {
                universityName.textContent = appConfig.header.universityName;
            }
            if (courseHeading && appConfig.header && appConfig.header.courseHeading) {
                courseHeading.textContent = appConfig.header.courseHeading;
            }
            if (mobileLabel && appConfig.labels && appConfig.labels.mobile) {
                mobileLabel.textContent = appConfig.labels.mobile;
            }
            if (verifyMobileButton && appConfig.labels && appConfig.labels.verifyMobileButton) {
                verifyMobileButton.textContent = appConfig.labels.verifyMobileButton;
            }
            if (trainingLabel && appConfig.labels && appConfig.labels.training) {
                trainingLabel.textContent = appConfig.labels.training;
            }
            const trainingDropdown = document.getElementById('ddltraining');
            if (trainingDropdown && appConfig.messages && appConfig.messages.selectTraining) {
                trainingDropdown.innerHTML = '<option value="">' + appConfig.messages.selectTraining + '</option>';
            }
            if (verifyButton && appConfig.labels && appConfig.labels.verifyButton) {
                verifyButton.textContent = appConfig.labels.verifyButton;
            }
            if (footerText && appConfig.labels && appConfig.labels.footer) {
                footerText.textContent = appConfig.labels.footer;
            }

            if (verifyButton) {
                verifyButton.disabled = true;
            }
            if (trainingDropdown) {
                trainingDropdown.disabled = true;
            }
        }

        async function loadConfig() {
            try {
                const response = await fetch(CONFIG_JSON, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('Config JSON not found');
                }
                const jsonConfig = await response.json();

                const hasRequiredFields =
                    jsonConfig &&
                    jsonConfig.pageTitle &&
                    jsonConfig.header &&
                    jsonConfig.labels &&
                    jsonConfig.api &&
                    jsonConfig.messages &&
                    jsonConfig.header.primaryLogoSrc &&
                    jsonConfig.header.secondaryLogoSrc &&
                    jsonConfig.header.logoTitle &&
                    jsonConfig.header.universityName &&
                    jsonConfig.header.courseHeading &&
                    jsonConfig.labels.mobile &&
                    jsonConfig.labels.verifyMobileButton &&
                    jsonConfig.labels.training &&
                    jsonConfig.labels.verifyButton &&
                    jsonConfig.labels.footer &&
                    jsonConfig.api.apiKey &&
                    jsonConfig.api.apiPath &&
                    jsonConfig.api.userInfoEndpoint &&
                    jsonConfig.api.participantsTrainingEndpoint &&
                    jsonConfig.api.verifyCertificateEndpoint &&
                    jsonConfig.messages.invalidMobile &&
                    jsonConfig.messages.mobileNotRegistered &&
                    jsonConfig.messages.selectTraining &&
                    jsonConfig.messages.noTrainingRegistered &&
                    jsonConfig.messages.validCertificatePrefix &&
                    jsonConfig.messages.invalidCertificate &&
                    jsonConfig.messages.verifyFailed &&
                    jsonConfig.messages.noResponse &&
                    jsonConfig.messages.unexpectedError &&
                    jsonConfig.messages.apiErrorPrefix;

                if (!hasRequiredFields) {
                    throw new Error('Config JSON is missing required fields');
                }

                appConfig = jsonConfig;
                applyConfigToUi();
            } catch (error) {
                const verifyButton = document.getElementById('verifyButton');
                if (verifyButton) {
                    verifyButton.disabled = true;
                }
                alert('Configuration load failed. Please check html_config.json');
            }
        }

        function Verify_Mobile() {
            if (!appConfig) {
                alert('Configuration is not loaded.');
                return;
            }

            const mobileNo = document.getElementById('mobileNo').value.trim();
            if (mobileNo.length !== 10 || !/^\d+$/.test(mobileNo)) {
                alert(appConfig.messages.invalidMobile);
                return;
            }

            verifiedMobileNo = '';
            verifiedUserCode = '';
            document.getElementById('verifyButton').disabled = true;
            document.getElementById('ddltraining').innerHTML = '<option value="">' + appConfig.messages.selectTraining + '</option>';
            document.getElementById('ddltraining').disabled = true;

            const apiUrl = appConfig.api.apiPath + appConfig.api.userInfoEndpoint + '?username=91-' + encodeURIComponent(mobileNo);
            axios.get(apiUrl, {
                headers: {
                    'APIKey': appConfig.api.apiKey,
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                const resolvedAgencyId = getAgencyIdFromUserInfo(response.data);
                const resolvedUserCode = getUserCodeFromUserInfo(response.data);
                if (response.status === 200 && resolvedAgencyId && resolvedUserCode) {
                    agencyid = resolvedAgencyId;
                    verifiedMobileNo = mobileNo;
                    verifiedUserCode = String(resolvedUserCode).trim();
                    Get_trainings(agencyid);
                } else {
                    alert(appConfig.messages.mobileNotRegistered);
                }
            })
            .catch(() => {
                alert(appConfig.messages.mobileNotRegistered);
            });
        }

        function Get_trainings(participantAgencyId) {
            const apiUrl = appConfig.api.apiPath + appConfig.api.participantsTrainingEndpoint + '?participantid=' + encodeURIComponent(participantAgencyId);
            fetch(apiUrl, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'APIKey': appConfig.api.apiKey
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ': Failed to fetch trainings');
                }
                return response.text();
            })
            .then(rawText => {
                if (!rawText) {
                    return [];
                }
                return JSON.parse(rawText);
            })
            .then(data => {
                const trainings = getTrainingsArray(data);
                const dropdown = document.getElementById('ddltraining');
                dropdown.innerHTML = '<option value="">' + appConfig.messages.selectTraining + '</option>';

                if (!Array.isArray(trainings) || trainings.length === 0) {
                    document.getElementById('verifyButton').disabled = true;
                    dropdown.disabled = true;
                    alert(appConfig.messages.noTrainingRegistered);
                    return;
                }

                trainings.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.trainingid;
                    const displayControl = item.trg_Setting && Array.isArray(item.trg_Setting.displaycontrols)
                        ? item.trg_Setting.displaycontrols.find(dc => Number(dc.id) === 2 && dc.displaytext)
                        : null;
                    const displayName = ((displayControl && displayControl.displaytext) || item.training_title || '').trim();
                    option.textContent = item.trainingcode + '-' + displayName;
                    dropdown.appendChild(option);
                });

                dropdown.disabled = false;
                document.getElementById('verifyButton').disabled = false;
                alert((appConfig.messages.selectTrainingToVerifyCertificate || (appConfig.messages.selectTraining + ' to verify certificate')) + '.');
            })
            .catch(error => {
                document.getElementById('verifyButton').disabled = true;
                document.getElementById('ddltraining').disabled = true;
                alert(appConfig.messages.apiErrorPrefix + ((error && error.message) || appConfig.messages.noTrainingRegistered));
            });
        }

        function Verify_Certificate() {
            if (!appConfig) {
                alert('Configuration is not loaded.');
                return;
            }

            var trainingid = document.getElementById('ddltraining').value;
            var usercode = verifiedUserCode;
            const apiKey = appConfig.api.apiKey;
            const APIPath = appConfig.api.apiPath;

            if (!usercode) {
                alert(appConfig.messages.invalidMobile);
                return;
            }

            if (!trainingid) {
                alert(appConfig.messages.selectTraining);
                return;
            }

            const apiUrl = APIPath + appConfig.api.verifyCertificateEndpoint + '?usercode=' + encodeURIComponent(usercode) + '&trainingid=' + encodeURIComponent(trainingid);

            axios.get(apiUrl, {
                headers: {
                    'APIKey': apiKey,
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (response.status === 200) {
                    if (response.data !== '') {
                        alert(appConfig.messages.validCertificatePrefix + response.data);
                    } else {
                        alert(appConfig.messages.invalidCertificate);
                    }
                } else {
                    alert(appConfig.messages.verifyFailed);
                }
            })
            .catch(error => {
                if (error.response) {
                    alert(appConfig.messages.apiErrorPrefix + error.response.status + ' - ' + ((error.response.data && error.response.data.message) || 'Unknown error'));
                } else if (error.request) {
                    alert(appConfig.messages.noResponse);
                } else {
                    alert(appConfig.messages.unexpectedError);
                }
            });
        }

        loadConfig();
    </script>
</body>
</html>
