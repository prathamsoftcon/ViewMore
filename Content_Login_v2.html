function updateSelectedTrainingMeta(selectedTrainingId) {
    const ddl = document.getElementById('ddltraining');
    if (!ddl) {
        return;
    }

    if (selectedTrainingId) {
        ddl.value = selectedTrainingId;
    }

    const selectedOption = ddl.options[ddl.selectedIndex];
    if (!selectedOption || !selectedOption.value) {
        trainingCode = "";
        trainingName = "";
        return;
    }

    trainingid = selectedOption.value;
    trainingCode = String(selectedOption.getAttribute('data-training-code') || '').trim();
    trainingName = String(selectedOption.getAttribute('data-training-name') || '').trim();

    if (!trainingCode || !trainingName) {
        const optionText = String(selectedOption.textContent || '').trim();
        const separatorIndex = optionText.indexOf('-');

        if (separatorIndex > -1) {
            if (!trainingCode) {
                trainingCode = optionText.slice(0, separatorIndex).trim();
            }
            if (!trainingName) {
                trainingName = optionText.slice(separatorIndex + 1).trim();
            }
        } else if (!trainingName) {
            trainingName = optionText;
        }
    }
}

function applyConfigToUi() {
    if (!appConfig) {

    }

    }

    const verifyMobileTitle = document.getElementById('verifyMobileTitle');
    const mobileLabel = document.getElementById('mobileLabel');
    const btnNext = document.getElementById('btnnext');
    const trainingTitle = document.getElementById('trainingTitle');

        verifyMobileTitle.textContent = 'Verify Your Mobile Number';
    }
    if (mobileLabel && labels.mobile) {
        mobileLabel.textContent = labels.mobile + ':';
    }
    if (btnNext && labels.verifyMobileButton) {
        btnNext.textContent = labels.verifyMobileButton;
    }
    if (trainingTitle && labels.training) {
        trainingTitle.textContent = labels.training;
    }
}

async function loadConfig() {
    try {
        const response = await fetch(CONFIG_JSON, { cache: 'no-store' });
        if (!response.ok) {
            throw new Error('Config JSON not found');
        }

        appConfig = await response.json();
        appMessages = Object.assign({}, appMessages, appConfig.messages || {});

        if (!appConfig.api || !appConfig.api.apiPath) {
            throw new Error('Config JSON is missing api.apiPath');
        }

        if (appConfig.api && appConfig.api.apiKey) {
            apiKey = appConfig.api.apiKey;
        }
        APIPath = appConfig.api.apiPath;

        applyConfigToUi();
    } catch (error) {
        console.error('Configuration load failed:', error);
    }
}

function setLocalStorage(key, value) {
  const now = new Date();

  // 15 days in milliseconds
  const expiry = now.getTime() + 15 * 24 * 60 * 60 * 1000;

  const item = {
    value: value,
    expiry: expiry
  };

  localStorage.setItem(key, JSON.stringify(item));
}
function Check_Local_Storage(key) {
  const itemStr = localStorage.getItem(key);

  // If item doesn't exist, return null
  if (!itemStr) return null;

  const item = JSON.parse(itemStr);
  const now = new Date();

  // If expired, remove it and return null
  if (now.getTime() > item.expiry) {
    localStorage.removeItem(key);
    return null;
  }

  return item.value;
}

function getFileType(filePath) {
  if (!filePath) return null;

  // Decode encoded characters like %20, %5C, etc.
  const decoded = decodeURIComponent(filePath);
   // Remove query params (?v=1) and hash (#section)
  const cleanPath = decoded.split('?')[0].split('#')[0];

  // Extract filename safely (handles / and \)
  const fileName = cleanPath.split('/').pop().split('\\').pop();

//   // Extract filename or extension safely
//   const fileName = decoded.split('/').pop().split('\\').pop();

  // Get extension
  const ext = fileName.split('.').pop().toLowerCase();

  if (['html', 'htm'].includes(ext)) return 'html';
  if (ext === 'pdf') return 'pdf';
  if (['ppt', 'pptx'].includes(ext)) return 'ppt';
    if (['mp4', 'mov', 'wmv', 'avi', 'mkv', 'flv', 'webm', 'm3u8'].includes(ext)) return 'video';

  return 'unknown';
}

function guid() {
    function s4() {
        return Math.floor((1 + Math.random()) * 0x10000)
            .toString(16)
            .substring(1);
    }
    return s4() + s4() + '-' + s4() + '-' + s4() + '-' +
        s4() + '-' + s4() + s4() + s4();
}
function getCurrentDateTime() {
  const now = new Date();

  const yyyy = now.getFullYear();
  const MM = String(now.getMonth() + 1).padStart(2, "0");
  const dd = String(now.getDate()).padStart(2, "0");

  const hh = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");
  const ss = String(now.getSeconds()).padStart(2, "0");

  return `${yyyy}-${MM}-${dd} ${hh}:${mm}:${ss}`;
}

<script>
    otpInputs.forEach((input, index) => {

        // Move to next input when a digit is typed
        input.addEventListener("input", () => {
            if (input.value.length === 1) {
                if (index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            }
        });

        // Move to previous input on backspace
        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && input.value === "") {
                if (index > 0) {
                    otpInputs[index - 1].focus();
                }
            }
        });
    });
</script>
