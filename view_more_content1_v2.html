    <script>
        // --- Modal Control JavaScript ---
		var userid=""
		var agencyid=""
        var currentTrainingId = ''
        const APP_VERSION = "2026.05.01.1";
        const CONFIG_JSON = './html_config.json';
        const OTP_CACHE_KEY = 'certificate_otp_cache';
        const OTP_CACHE_MAX_AGE_DAYS = 15;
		let apiKey = '';
        const verificationModal = document.getElementById('verificationModal');
		const sliderModal = document.getElementById('Captchamodal');
        let APIPath = '';
        let redirectBaseUrl = '';
		let appConfig = null;
		//const APIPath= "http://p9:5858/api"

        async function loadConfig() {
            try {
                const response = await fetch(CONFIG_JSON, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('Config JSON not found');
                }

                appConfig = await response.json();

                if (!appConfig || !appConfig.api || !appConfig.api.apiPath || !appConfig.api.baseUrl) {
                    throw new Error('Config JSON is missing api.apiPath or api.baseUrl');
                }

                APIPath = String(appConfig.api.apiPath).trim();
                redirectBaseUrl = String(appConfig.api.baseUrl).trim();

                if (appConfig.api.apiKey) {
                    apiKey = appConfig.api.apiKey;
                }

                applyConfigToUi();
            } catch (error) {
                console.error('Configuration load failed. Using default API path.', error);
            }
        }

        function applyConfigToUi() {
            if (!appConfig) {
                return;
            }

            document.title = appConfig.pageTitle || document.title;

            const primaryLogo = document.getElementById('primaryLogo');
            const secondaryLogo = document.getElementById('secondaryLogo');
            const universityName = document.getElementById('universityName');
            const courseHeading = document.getElementById('product-list-heading');
            const footerText = document.getElementById('footerText');
            const trainingHeading = getTrainingHeadingFromUrl();

            if (primaryLogo && appConfig.header && appConfig.header.primaryLogoSrc) {
                primaryLogo.src = appConfig.header.primaryLogoSrc;
            }
            if (secondaryLogo && appConfig.header && appConfig.header.secondaryLogoSrc) {
                secondaryLogo.src = appConfig.header.secondaryLogoSrc;
            }

            if (appConfig.header && appConfig.header.logoTitle) {
                if (primaryLogo) {
                    primaryLogo.title = appConfig.header.logoTitle;
                    primaryLogo.alt = appConfig.header.logoTitle;
                }
                if (secondaryLogo) {
                    secondaryLogo.title = appConfig.header.logoTitle;
                    secondaryLogo.alt = appConfig.header.logoTitle;
                }
            }

            if (universityName && appConfig.header && appConfig.header.universityName) {
                universityName.textContent = appConfig.header.universityName;
            }
            if (courseHeading) {
                if (trainingHeading) {
                    courseHeading.textContent = trainingHeading;
                } else if (appConfig.header && appConfig.header.courseHeading1) {
                    courseHeading.textContent = appConfig.header.courseHeading1;
                }
            }
            if (footerText && appConfig.labels && appConfig.labels.footer) {
                footerText.textContent = appConfig.labels.footer;
            }
        }

        function getTrainingHeadingFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const trainingName = String(params.get('trainingname') || '').trim();
            const trainingCode = String(params.get('trainingcode') || '').trim();

            if (trainingName && trainingCode) {
                return  trainingName + ' - ' + trainingCode ;
            }
            if (trainingName) {
                return trainingName;
            }
            if (trainingCode) {
                return trainingCode;
            }

            return '';
        }

        function getOtpCache() {
            try {
                const raw = localStorage.getItem(OTP_CACHE_KEY);
                if (!raw) {
                    return null;
                }
                return JSON.parse(raw);
            } catch (error) {
                console.warn('Invalid OTP cache format. Clearing cache.', error);
                localStorage.removeItem(OTP_CACHE_KEY);
                return null;
            }
        }

        function isOtpCacheValid(cache, mobileNumber) {
            if (!cache || !cache.mobileNumber || !cache.userid || !cache.agencyid || !cache.savedAt) {
                return false;
            }

            if (String(cache.mobileNumber) !== String(mobileNumber)) {
                return false;
            }

            const savedAt = new Date(cache.savedAt).getTime();
            if (Number.isNaN(savedAt)) {
                return false;
            }

            const maxAgeMs = OTP_CACHE_MAX_AGE_DAYS * 24 * 60 * 60 * 1000;
            return Date.now() - savedAt <= maxAgeMs;
        }

        function persistOtpCache(mobileNumber, cacheUserid, cacheAgencyid, payload) {
            const cache = {
                mobileNumber: String(mobileNumber),
                userid: cacheUserid,
                agencyid: cacheAgencyid,
                payload: payload || null,
                savedAt: new Date().toISOString()
            };
            localStorage.setItem(OTP_CACHE_KEY, JSON.stringify(cache));
        }
		
        function openModal() {
            verificationModal.classList.add('show');
            // Reset form to initial state when opened
            document.getElementById('mobile-input-section').style.display = 'block';
            document.getElementById('otp-section').style.display = 'none';
            document.getElementById('otp-sent-message').style.display = 'none';
            document.getElementById('userid').disabled = false;
            document.getElementById('userid').value = ''; // Clear previous mobile number
            document.getElementById('userid').focus();
            document.querySelectorAll('.otp-inputs input').forEach(input => input.value = ''); // Clear OTP inputs
        }

        function closeModal() {
            verificationModal.classList.remove('show');
        }
		function closeCaptchaModal() {
            sliderModal.classList.remove('show');
        }
		

        // Close modal when clicking outside of the modal content
     

        // --- Mobile Verification Form Logic (Copied and adapted) ---
        const mobileInputSection = document.getElementById('mobile-input-section');
        const otpSection = document.getElementById('otp-section');
        const otpSentMessage = document.getElementById('otp-sent-message');
        const useridInput = document.getElementById('userid');
        const otpInputs = document.querySelectorAll('.otp-inputs input');

        async function initPage() {
            await loadConfig();
            CHECK_MOBILE_ON_LOAD();
            renderContentForSelectedTraining();
        }

        function getDynamicContentCacheKey(trainingId) {
            const normalizedTrainingId = String(trainingId || '').trim();
            return normalizedTrainingId
                ? ('content_items_dynamic_' + normalizedTrainingId)
                : 'content_items_dynamic_default';
        }

        function readDynamicContentCache(trainingId) {
            try {
                const cacheKey = getDynamicContentCacheKey(trainingId);
                let raw = localStorage.getItem(cacheKey);
                if (!raw) {
                    raw = localStorage.getItem('content_items_dynamic');
                }
                if (!raw) {
                    return null;
                }

                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed) || parsed.length === 0) {
                    return null;
                }

                const targetCacheKey = getDynamicContentCacheKey(trainingId);
                if (!localStorage.getItem(targetCacheKey)) {
                    localStorage.setItem(targetCacheKey, JSON.stringify(parsed));
                }

                return parsed;
            } catch (error) {
                console.warn('Invalid content_items_dynamic cache.', error);
                return null;
            }
        }

        function renderContentFromDynamicCache(trainingId) {
            const cachedRows = readDynamicContentCache(trainingId);
            if (!cachedRows) {
                return false;
            }

            const groups = mapRowsToRenderGroups(cachedRows);
            if (!groups.length) {
                return false;
            }

            renderGroups(groups);
            return true;
        }

        function renderContentForSelectedTraining() {
            const activeTrainingId = String(currentTrainingId || '').trim();
            const hasRenderedFromCache = renderContentFromDynamicCache(activeTrainingId);

            if (currentTrainingId) {
                renderContentFromApis(currentTrainingId)
                    .catch(error => {
                        console.error('Failed to bind dynamic content for selected training:', error);
                        if (!hasRenderedFromCache) {
                            const productList = document.querySelector('.product-list');
                            if (productList) {
                                productList.innerHTML = '';
                            }
                        }
                    });
                return;
            }

            if (!hasRenderedFromCache) {
                const productList = document.querySelector('.product-list');
                if (productList) {
                    productList.innerHTML = '';
                }
            }
        }

        function getApiArray(payload) {
            if (Array.isArray(payload)) {
                return payload;
            }

            if (payload && Array.isArray(payload.items)) {
                return payload.items;
            }

            if (payload && Array.isArray(payload.data)) {
                return payload.data;
            }

            if (payload && payload.result && Array.isArray(payload.result.items)) {
                return payload.result.items;
            }

            if (payload && payload.result && Array.isArray(payload.result.data)) {
                return payload.result.data;
            }

            return [];
        }

        function isOpenStatus(value) {
            if (value == null || value === '') {
                return true;
            }
            const normalized = String(value == null ? '' : value).trim().toLowerCase();
            return normalized === '0' || normalized === '1' || normalized === 'open' || normalized === 'active';
        }

        function getFieldValue(row, keys) {
            if (!row || !Array.isArray(keys)) {
                return '';
            }

            for (let i = 0; i < keys.length; i++) {
                const key = keys[i];
                if (Object.prototype.hasOwnProperty.call(row, key) && row[key] != null && row[key] !== '') {
                    return row[key];
                }
            }

            return '';
        }

        function getFileTypeFromPath(filePath) {
            if (!filePath) {
                return 'unknown';
            }

            const cleanPath = String(filePath).split('?')[0].split('#')[0];
            const fileName = cleanPath.split('/').pop().split('\\').pop();
            const ext = (fileName.split('.').pop() || '').toLowerCase();

            if (['mp4', 'mov', 'wmv', 'avi', 'mkv', 'flv', 'webm', 'm3u8'].includes(ext)) {
                return 'video';
            }
            if (ext === 'pdf') {
                return 'pdf';
            }
            if (['ppt', 'pptx'].includes(ext)) {
                return 'ppt';
            }
            if (['html', 'htm'].includes(ext)) {
                return 'html';
            }

            return 'unknown';
        }

        function mapContentType(item) {
            const filePath = getFieldValue(item, ['globalWysiwagText', 'global_wysiwag_text', 'ttsad_file_path', 'file_path', 'filepath']);
            const fileType = getFileTypeFromPath(filePath || '');

            if (fileType === 'pdf') {
                return { type: 'pdf', redirection_path: 'litteraroompdf' };
            }
            if (fileType === 'ppt') {
                return { type: 'PPT', redirection_path: 'litteraroomppt' };
            }
            if (fileType === 'video') {
                return { type: 'Video', redirection_path: 'videolearning' };
            }
            if (fileType === 'html') {
                return { type: 'Activity', redirection_path: 'videolearning' };
            }

            return { type: 'View', redirection_path: 'videolearning' };
        }

        function getContentSourcePath(item) {
            return String(getFieldValue(item, ['globalWysiwagText', 'global_wysiwag_text', 'ttsad_file_path', 'file_path', 'filepath']) || '').trim();
        }

        function getSessionSerial(row, fallbackIndex) {
            const sessionNo = Number(row && row.ttttt_session_no);
            if (!Number.isNaN(sessionNo) && sessionNo > 0) {
                return sessionNo;
            }

            const displayTxt = String(row.ttttt_content_desc || '');
            const match = displayTxt.match(/#\s*Sr\s*-\s*(\d+)/i);
            if (match && match[1]) {
                return Number(match[1]);
            }
            return fallbackIndex + 1;
        }

        async function fetchTrainingApiRows(endpointCandidates, trainingId) {
            const encodedTrainingId = encodeURIComponent(trainingId);
            let lastError = null;

            for (let i = 0; i < endpointCandidates.length; i++) {
                const endpoint = endpointCandidates[i];
                const apiUrl = APIPath + '/' + endpoint + '?trainingid=' + encodedTrainingId;

                try {
                    const response = await axios.get(apiUrl, {
                        headers: {
                            'APIKey': apiKey,
                            'Content-Type': 'application/json'
                        }
                    });
                    return getApiArray(response.data);
                } catch (error) {
                    lastError = error;
                }
            }

            throw lastError || new Error('Failed to load training API data');
        }

        async function buildGroupedContentJson(trainingId) {
            const sessionRowsRaw = await fetchTrainingApiRows(['trgsessions', 'trgsession'], trainingId);
            const contentRowsRaw = await fetchTrainingApiRows(['trg_content'], trainingId);

            console.log('Session rows raw count:', Array.isArray(sessionRowsRaw) ? sessionRowsRaw.length : 0);
            console.log('Content rows raw count:', Array.isArray(contentRowsRaw) ? contentRowsRaw.length : 0);

            const sessionRows = sessionRowsRaw
                .filter(row => row && isOpenStatus(getFieldValue(row, ['ttttt_status', 'status', 'is_active'])))
                .map((row, index) => ({
                    sr_no: getSessionSerial(row, index),
                    title: String(getFieldValue(row, ['ttttt_content_desc', 'module', 'ttttt_content_desc', 'title', 'ttttt_title']) || '').trim(),
                    session_id: String(getFieldValue(row, ['ttttt_session_id', 'ttttt_id', 'session_id', 'id']) || '').trim()
                }))
                .filter(row => row.title && row.session_id);

            const contentRows = contentRowsRaw
                .filter(row => row && isOpenStatus(getFieldValue(row, ['ttsad_status', 'status', 'is_active'])))
                .map(row => {
                    const mapped = mapContentType(row);
                    return {
                        ttsam_id: String(getFieldValue(row, ['ttsam_id', 'id', 'ttsad_ttsam_id']) || '').trim(),
                        ttsam_ttttt_session_id: String(getFieldValue(row, ['ttsam_ttttt_session_id', 'ttttt_session_id', 'session_id', 'ttsad_ttttt_session_id']) || '').trim(),
                        type: mapped.type,
                        redirection_path: mapped.redirection_path,
                        content_path: getContentSourcePath(row)
                    };
                })
                .filter(row => row.ttsam_id && row.ttsam_ttttt_session_id);

            console.log('Session rows after filter:', sessionRows.length);
            console.log('Content rows after filter:', contentRows.length);

            const contentBySession = {};
            contentRows.forEach(row => {
                if (!contentBySession[row.ttsam_ttttt_session_id]) {
                    contentBySession[row.ttsam_ttttt_session_id] = [];
                }
                contentBySession[row.ttsam_ttttt_session_id].push({
                    type: row.type,
                    ttsam_id: row.ttsam_id,
                    redirection_path: row.redirection_path,
                    content_path: row.content_path
                });
            });

            const grouped = sessionRows
                .map(row => ({
                    sr_no: row.sr_no,
                    title: row.title,
                    children: contentBySession[row.session_id] || []
                }))
                .filter(row => row.children.length > 0)
                .sort((a, b) => a.sr_no - b.sr_no);

            try {
                const cacheKey = getDynamicContentCacheKey(trainingId);
                localStorage.setItem(cacheKey, JSON.stringify(grouped));
            } catch (error) {
                console.warn('Unable to store generated content JSON in localStorage.', error);
            }

            console.log('Generated content_items_dynamic:', JSON.stringify(grouped, null, 2));

            return grouped;
        }

        function renderGroups(groups) {
            const productList = document.querySelector('.product-list');
            if (!productList) {
                return;
            }

            productList.innerHTML = '';

            groups.forEach(group => {
                const li = document.createElement('li');
                li.className = 'product-item';

                const title = document.createElement('span');
                title.className = 'price';
                title.textContent = group.title;
                li.appendChild(title);

                const actions = document.createElement('div');
                actions.className = 'content-actions';

                group.items.forEach(item => {
                    const lnk = buildContentLink(item);
                    if (!lnk) {
                        return;
                    }

                    const button = document.createElement('a');
                    button.href = '#';
                    button.className = 'button';
                    button.textContent = item.type || 'View';
                    button.addEventListener('click', function (event) {
                        event.preventDefault();
                        Open_Video_Link(lnk);
                    });
                    actions.appendChild(button);
                });

                li.appendChild(actions);
                productList.appendChild(li);
            });
        }

        function mapRowsToRenderGroups(rows) {
            return rows
                .map(row => {
                    const srNo = Number(row.sr_no || row.srNo || 0);
                    const title = String(row.title || '').trim();

                    if (Array.isArray(row.children)) {
                        return {
                            srNo: srNo,
                            title: title,
                            items: row.children.map(child => ({
                                type: String((child && child.type) || 'View').trim(),
                                ttsam_id: child ? child.ttsam_id : '',
                                redirection_path: child ? child.redirection_path : '',
                                content_path: child ? child.content_path : ''
                            }))
                        };
                    }

                    return {
                        srNo: srNo,
                        title: title,
                        items: [{
                            type: String(row.type || 'View').trim(),
                            ttsam_id: row.ttsam_id,
                            redirection_path: row.redirection_path,
                            content_path: String(row.content_path || row.globalWysiwagText || row.global_wysiwag_text || row.ttsad_file_path || row.file_path || row.filepath || '').trim()
                        }]
                    };
                })
                .filter(group => group.title && group.items.length > 0)
                .sort((a, b) => a.srNo - b.srNo);
        }

        async function renderContentFromApis(trainingId) {
            const generatedRows = await buildGroupedContentJson(trainingId);
            const groups = mapRowsToRenderGroups(generatedRows);
            if (!groups.length) {
                throw new Error('No content available for selected training.');
            }
            renderGroups(groups);
        }

        var DIRECT_LINK_PREFIX = '__direct__::';

        function buildContentLink(item) {
            const sourcePath = String(item.content_path || item.globalWysiwagText || item.global_wysiwag_text || item.ttsad_file_path || item.file_path || item.filepath || '').trim();
            const ttsamId = String(item.ttsam_id || '').trim();
            const redirectPath = String(item.redirection_path || 'videolearning').trim();

            if (sourcePath) {
                return DIRECT_LINK_PREFIX + sourcePath;
            }

            if (!ttsamId) {
                return '';
            }

            if (redirectPath.indexOf('{ttsam_id}') !== -1) {
                return redirectPath.replace('{ttsam_id}', ttsamId);
            }

            if (redirectPath.endsWith('/')) {
                return redirectPath + ttsamId;
            }

            if (redirectPath.toLowerCase().endsWith(ttsamId.toLowerCase())) {
                return redirectPath;
            }

            return redirectPath + '/' + ttsamId;
        }

        function requestOtp() {
            const mobileNumber = useridInput.value;
            if (mobileNumber.length === 10 && /^\d+$/.test(mobileNumber)) {
            const cached = getOtpCache();
            if (isOtpCacheValid(cached, mobileNumber)) {
                userid = cached.userid;
                agencyid = cached.agencyid;
                localStorage.setItem('participant_userid', agencyid);
                closeModal();
                return;
            }

            if (cached) {
                localStorage.removeItem(OTP_CACHE_KEY);
            }

		 	const apiUrl = APIPath+'/GenerateOTP?username=91-'+mobileNumber;


			axios.get(apiUrl, {
				headers: {
				'APIKey': apiKey,
				'Content-Type': 'application/json' // Adjust if API expects something else
				}
			})
			.then(response => {
			// Axios automatically parses JSON
			console.log('OTP Generation Response:', response.data);
			if (response.status==200) {
				console.log(`Sending OTP to: ${mobileNumber}`);
                userid=response.data.userid;
				agencyid=response.data.agencyid;
                mobileInputSection.style.display = 'none';
                otpSection.style.display = 'block';
                otpSentMessage.style.display = 'block';
                useridInput.disabled = true;

                otpInputs.forEach(input => input.value = '');
                otpInputs[0].focus();
			} else {
        alert('Your no is not registered,Please contact to your college. ');
			}
		})
			.catch(error => {
    // Handle errors
				if (error.response) {
				// The request was made and the server responded with a status code
				// that falls out of the range of 2xx
				console.error('API Error Response:', error.response.data);
				console.error('API Error Status:', error.response.status);
				alert(`API Error: ${error.response.status} - ${error.response.data.message || 'Unknown error'}`);
				} else if (error.request) {
        // The request was made but no response was received
					console.error('No response received:', error.request);
					alert('Your no is not registered,Please contact to your college ');
				} else {
					// Something else happened in setting up the request
					console.error('Request setup error:', error.message);
					alert('An unexpected error occurred.');
				}
				});
			
			
              
            } else {
                alert('Please enter a valid 10-digit mobile number.');
                useridInput.focus();
            }
        }

        function verifyOtp() {
            const enteredOtp = Array.from(otpInputs).map(input => input.value).join('');
            const username = '91-'+useridInput.value;
            if (enteredOtp.length === 6 && /^\d+$/.test(enteredOtp)) {

<script>
  const thumb = document.getElementById('sliderThumb');
  const track = document.getElementById('sliderTrack');
  const status = document.getElementById('captchaStatus');

  let isDragging = false;
  let startX = 0;

  function startDrag(x) {
  
    isDragging = true;
    startX = x - thumb.offsetLeft;
  }

  function moveThumb(x) {
    if (!isDragging) return;
    let newX = x - startX;
    const maxX = track.clientWidth - thumb.clientWidth;
    newX = Math.max(0, Math.min(newX, maxX));
    thumb.style.left = newX + 'px';
  }

  function stopDrag() {
    if (!isDragging) return;
    isDragging = false;
    const maxX = track.clientWidth - thumb.clientWidth;
    if (parseInt(thumb.style.left) >= maxX - 5) {
      status.textContent = 'Verified ✅';
	
      status.className = 'captcha-status success';
      thumb.style.backgroundColor = '#2ecc71';
      thumb.textContent = '✔';
	  Open_Video_Link_redirect()
    } else {
      thumb.style.left = '0px';
      status.textContent = 'Try again';
      status.className = 'captcha-status fail';
    }
  }

  // Mouse events
  thumb.addEventListener('mousedown', e => startDrag(e.clientX));
  document.addEventListener('mousemove', e => moveThumb(e.clientX));
  document.addEventListener('mouseup', stopDrag);

  // Touch events
  thumb.addEventListener('touchstart', e => startDrag(e.touches[0].clientX));
  sliderModal.addEventListener('touchmove', e => {
    moveThumb(e.touches[0].clientX);
    e.preventDefault(); // prevent scrolling
  }, { passive: false });
  sliderModal.addEventListener('touchend', stopDrag);
  
  
  function resetSlider() {
  thumb.style.left = '0px';
  thumb.style.backgroundColor = '#4CAF50';
  thumb.textContent = '▶';
  status.textContent = 'Slide to verify (स्लाइड करें )';
  status.className = 'captcha-status';

  isDragging = false;
}



document.getElementById('otp-1').addEventListener('paste', function(e) {
    e.preventDefault(); // Stop the default paste behavior
    const paste = (e.clipboardData || window.clipboardData).getData('text').trim();
    const chars = paste.split('');

    for (let i = 0; i < 6; i++) {
        const input = document.getElementById(`otp-${i + 1}`);
        if (input) {
            input.value = chars[i] || ''; // Fill character if available, else empty
        }
    }

    // Optionally focus the next empty input
    for (let i = 0; i < 6; i++) {
        const input = document.getElementById(`otp-${i + 1}`);
        if (input.value === '') {
            input.focus();
            break;
        }
    }
});
</script>
